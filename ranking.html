<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUROKAGE — Hall da Fama</title>
<meta name="description" content="Ranking dos melhores ninjas da Temporada IV de KUROKAGE.">
<link rel="stylesheet" href="styles/main.css">
<script src="js/main.js" defer></script>
<script src="js/sidebar.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
</head>
<body>
<div class="grain"></div>

<div class="app">
  

  <main class="main" style="max-width: 1400px; margin: 0 auto;">
    <div class="topbar" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; flex-wrap: wrap; gap: 16px;">
      <div>
        <div class="eyebrow">Temporada IV</div>
        <h1 style="font-family:'Shippori Mincho', serif; font-size:30px; font-weight:600;">Hall da Fama</h1>
      </div>
      <div class="filters">
        <div class="filter active">Geral</div>
        <div class="filter">Por clã</div>
        <div class="filter">Semanal</div>
      </div>
    </div>

    <div id="podium-container" class="podium">
      <!-- Injetado via JS -->
    </div>

    <div class="list-head">
      <div>Pos.</div><div>Personagem</div><div>Vila</div><div>Nível</div><div>XP</div>
    </div>

    <div id="ranking-list">
      <!-- Injetado via JS -->
    </div>
  </main>
</div>

<script>
  // Simple inline script for filters toggle
  document.querySelectorAll('.filter').forEach(f => {
    f.addEventListener('click', () => {
      document.querySelectorAll('.filter').forEach(fl => fl.classList.remove('active'));
      f.classList.add('active');
    });
  });

  async function loadRanking() {
    if (!window.supabaseClient) return;
    
    // Fetch top 50 players
    const { data: players, error } = await window.supabaseClient
      .from('players')
      .select('name, class, level, xp, villages(name)')
      .order('level', { ascending: false })
      .order('xp', { ascending: false })
      .limit(50);

    if (error || !players) return console.error(error);

    const podiumContainer = document.getElementById('podium-container');
    const listContainer = document.getElementById('ranking-list');
    
    podiumContainer.innerHTML = '';
    listContainer.innerHTML = '';

    players.forEach((p, index) => {
      const pos = index + 1;
      const villageName = p.villages ? p.villages.name : 'Sem Vila';
      
      if (pos <= 3) {
        let medal = 'bronze';
        let rankText = '3º LUGAR';
        if (pos === 1) { medal = 'gold'; rankText = 'GRÃO-MESTRE'; }
        if (pos === 2) { medal = 'silver'; rankText = '2º LUGAR'; }

        // Render Podium
        podiumContainer.innerHTML += `
          <div class="pod-card ${medal}">
            <div class="pod-rank">${rankText}</div>
            <div class="pod-avatar">${p.name.charAt(0).toUpperCase()}</div>
            <div class="pod-name">${p.name}</div>
            <div class="pod-clan">${villageName}</div>
            <div class="pod-xp">${p.xp || 0} XP</div>
          </div>
        `;
      } else {
        // Render List
        listContainer.innerHTML += `
          <div class="row">
            <div class="pos">${pos < 10 ? '0'+pos : pos}</div>
            <div class="who"><div class="mini-avatar">${p.name.charAt(0).toUpperCase()}</div><div><div class="name">${p.name}</div></div></div>
            <div class="clan">${villageName}</div>
            <div class="lvl">${p.level}</div>
            <div class="xp">${p.xp || 0}</div>
          </div>
        `;
      }
    });
  }

  document.addEventListener('DOMContentLoaded', loadRanking);
</script>
</body>
</html>
