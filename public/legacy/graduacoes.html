<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUROKAGE — Graduações</title>
<link rel="stylesheet" href="styles/main.css">
<script src="js/main.js" defer></script>
<script src="js/sidebar.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/engine.js" defer></script>
<style>
  .grad-container {
    display: flex;
    gap: 32px;
    align-items: stretch;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 40px;
  }
  .grad-card {
    background: var(--surface-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 350px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .grad-card.locked {
    opacity: 0.5;
    pointer-events: none;
    filter: grayscale(100%);
  }
  .grad-card.active {
    border-color: var(--seal-bright);
    box-shadow: 0 0 20px rgba(230, 57, 70, 0.1);
  }
  .grad-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .grad-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    color: var(--seal-bright);
    margin-bottom: 8px;
  }
  .grad-desc {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .req-list {
    width: 100%;
    text-align: left;
    margin-bottom: 24px;
    background: rgba(0,0,0,0.2);
    padding: 16px;
    border-radius: 6px;
  }
  .req-item {
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .req-item:last-child {
    margin-bottom: 0;
  }
  .req-item.done { color: #4ade80; }
  .req-item.fail { color: #ef4444; }
  
  .btn-graduar {
    width: 100%;
    margin-top: auto;
  }
</style>
</head>
<body>
<div class="grain"></div>
<div class="app">
  <main class="main" style="max-width: 1200px; margin: 0 auto;">
    <div class="topbar">
      <div>
        <div class="eyebrow">Academia Ninja</div>
        <h1 style="font-family:'Shippori Mincho', serif; font-size:30px; font-weight:600;">Graduações</h1>
        <div class="sub">Prove seu valor e suba na hierarquia shinobi.</div>
      </div>
    </div>

    <div class="grad-container" id="grad-container">
      <div style="text-align: center; width: 100%; padding: 50px; color: var(--text-muted);">
        Carregando requisitos de graduação...
      </div>
    </div>
  </main>
</div>

<script>
  document.addEventListener('engineLoaded', () => {
    renderGraduacoes();
  });

  const Ranks = [
    {
      id: "Estudante da Academia",
      next: "Genin"
    },
    {
      id: "Genin",
      icon: "🥷",
      title: "Genin",
      desc: "Seu primeiro dia depois da academia ninja. Você receberá sua bandana e poderá explorar o que está além dos portões da Vila.",
      reqs: [
        { label: "Nível 5 ou superior", check: () => PlayerState.level >= 5, progress: () => `${PlayerState.level}/5` },
        { label: "Completar 10 Tarefas Iniciais", check: () => PlayerState.tasks_completed >= 10, progress: () => `${PlayerState.tasks_completed}/10` },
        { label: "Ter 1 Jutsu Aprendido", check: () => PlayerState.activeJutsus.length >= 1, progress: () => `${PlayerState.activeJutsus.length}/1` },
        { label: "Ter 5 Vitórias contra NPC", check: () => PlayerState.npc_wins >= 5, progress: () => `${PlayerState.npc_wins}/5` }
      ]
    },
    {
      id: "Chuunin",
      icon: "⚔️",
      title: "Chuunin",
      desc: "Ninja graduado e com elevado nível de confiança na Vila. Pode participar de equipes, organizações e torneios ninjas.",
      reqs: [
        { label: "Nível 15 ou superior", check: () => PlayerState.level >= 15, progress: () => `${PlayerState.level}/15` },
        { label: "Completar 10 Missões Rank D", check: () => PlayerState.missions_d >= 10, progress: () => `${PlayerState.missions_d}/10` },
        { label: "Ter 9 Jutsus Aprendidos", check: () => false, progress: () => `0/9` },
        { label: "Ter 75 Vitórias NPC", check: () => PlayerState.npc_wins >= 75, progress: () => `${PlayerState.npc_wins}/75` }
      ]
    }
  ];

  function renderGraduacoes() {
    const container = document.getElementById('grad-container');
    container.innerHTML = '';

    const currentRank = PlayerState.rank;
    const currentIndex = Ranks.findIndex(r => r.id === currentRank);
    
    const nextRank = Ranks[currentIndex + 1];

    if (!nextRank) {
      container.innerHTML = `<div class="grad-card active"><div class="grad-icon">👑</div><div class="grad-title">Nível Máximo</div><div class="grad-desc">Você alcançou o topo da hierarquia Ninja.</div></div>`;
      return;
    }

    let reqsHtml = '';
    let canGraduate = true;

    nextRank.reqs.forEach(req => {
      const isMet = req.check();
      if (!isMet) canGraduate = false;
      const icon = isMet ? '✓' : '✗';
      const statusClass = isMet ? 'done' : 'fail';
      reqsHtml += `<div class="req-item ${statusClass}"><span>${icon}</span> <span>${req.label} (${req.progress()})</span></div>`;
    });

    container.innerHTML = `
      <div class="grad-card active">
        <div class="grad-icon">${nextRank.icon}</div>
        <div class="grad-title">${nextRank.title}</div>
        <div class="grad-desc">${nextRank.desc}</div>
        <div class="req-list">
          ${reqsHtml}
        </div>
        <button class="btn btn-graduar" ${canGraduate ? '' : 'disabled'} onclick="graduarPara('${nextRank.id}')">
          ${canGraduate ? 'Realizar Exame Ninja' : 'Requisitos Incompletos'}
        </button>
      </div>
    `;
  }

  async function graduarPara(novoRank) {
    if(!confirm(`Deseja realizar o exame para se tornar ${novoRank}?`)) return;
    
    const { error } = await window.supabaseClient
      .from('players')
      .update({ rank: novoRank })
      .eq('id', PlayerState.id);
      
    if (error) {
      alert("Erro ao graduar: " + error.message);
    } else {
      alert("Parabéns! Você acaba de se graduar para " + novoRank + "!");
      PlayerState.rank = novoRank;
      renderGraduacoes();
    }
  }
</script>
</body>
</html>
