<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUROKAGE — Acessar</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body class="login-body">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>

<div class="grain"></div>

<div class="panel-brand">
  <div class="strokes">
    <svg viewBox="0 0 500 700" preserveAspectRatio="xMidYMid slice">
      <path d="M40 30 C 100 160, 10 280, 110 410 C 170 500, 60 580, 100 690" stroke="#b3232d" stroke-width="3" fill="none" opacity="0.45"/>
      <path d="M120 60 C 170 210, 90 320, 160 460 C 200 550, 110 610, 150 690" stroke="#c9a227" stroke-width="1.5" fill="none" opacity="0.3"/>
      <circle cx="95" cy="160" r="2.5" fill="#c9a227" opacity="0.7"/>
      <circle cx="150" cy="430" r="2" fill="#b3232d" opacity="0.6"/>
    </svg>
  </div>
  <div class="brand"><div class="mark"></div>KUROKAGE</div>
  <div class="panel-quote">
    <div class="eyebrow">Temporada IV</div>
    <h2>O vínculo que você escolhe<br>vale mais que o <em>poder</em> que você herda.</h2>
  </div>
</div>

<div class="panel-form">
  <div class="tabs">
    <div class="tab active">Entrar</div>
    <div class="tab" onclick="window.location.href='criar.html'" style="cursor: pointer;">Criar conta</div>
  </div>

  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="row-between">
    <label class="checkbox"><input type="checkbox"> Manter conectado</label>
    <span class="forgot">Esqueci minha senha</span>
  </div>

  <button class="btn-primary" onclick="handleLogin()"><span>Acessar</span><div class="stamp"></div></button>

  <div class="divider"><div class="line"></div><span>OU</span><div class="line"></div></div>

  <div class="switch">Ainda não tem conta? <span style="color:var(--seal-bright); cursor:pointer; font-weight:600;" onclick="window.location.href='criar.html'">Forje seu personagem</span></div>
</div>

<script>
  async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if(!email || !password) return alert('Preencha os campos!');

    if (!window.supabaseClient) {
      return alert("Cliente Supabase não inicializado!");
    }

    const { data, error } = await window.supabaseClient.auth.signInWithPassword({
      email, password
    });

    if(error) {
      alert("Erro ao logar: " + error.message);
    } else {
      alert('Login bem-sucedido!');
      window.location.href = '/'; // Redireciona para o App React
    }
  }
</script>

</body>
</html>
